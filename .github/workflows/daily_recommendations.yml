name: Daily High-Star Fetcher

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run script
        run: node update_recommendations.js

      - name: Force write timestamp (keep repo active)
        run: |
          echo "Last run: $(date +'%Y-%m-%d %H:%M:%S UTC')" > .last_run
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Daily AI recommendations update - $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
