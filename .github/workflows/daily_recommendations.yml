name: High-Star Fetcher (Every 5 Hours)

on:
  schedule:
    # GitHub Actions 使用 UTC 时间；每天 00:00、05:00、10:00、15:00、20:00 UTC 自动运行
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  update-recommendations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node update_recommendations.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push update
        run: |
          echo "Last run: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > .last_run
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Update high-star recommendations - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: update-recommendations
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success Notification
        if: needs.update-recommendations.result == 'success'
        run: |
          echo "✅ Workflow succeeded"
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "✅ **High-Star Update 成功**\nRepo: DoTrungHuy/Daily-HighStar-Recommendations\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "No webhook configured"

      - name: Failure Notification
        if: needs.update-recommendations.result != 'success'
        run: |
          echo "❌ Workflow failed"
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "❌ **High-Star Update 失败**\nRepo: DoTrungHuy/Daily-HighStar-Recommendations\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n请检查日志"
            }' || echo "No webhook configured"
